services:
  # ─── PostgreSQL Database ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: anistito-db
    environment:
      POSTGRES_USER: anistito
      POSTGRES_PASSWORD: anistito
      POSTGRES_DB: anistito
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anistito"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis Cache & Message Broker ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: anistito-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── FastAPI Application ──────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anistito-api
    env_file:
      - .env
    # این مقادیر بر متغیرهای هم‌نام در .env (env_file) اولویت دارند — hostname باید db باشد.
    environment:
      DATABASE_URL: postgresql+asyncpg://anistito:anistito@db:5432/anistito
      DATABASE_URL_SYNC: postgresql://anistito:anistito@db:5432/anistito
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
      SECRET_KEY: change-me-in-production-use-a-real-secret-key
      APP_BASE_URL: https://lms.psychoanalysis.ir/anistito
      PAYMENT_CALLBACK_URL: https://lms.psychoanalysis.ir/anistito/api/payment/callback
      # دمو خودکار غیرفعال — برای پر کردن دستی دادهٔ دمو از اسکریپت‌ها یا API استفاده کنید
      SEED_DEMO_ON_STARTUP: "false"
      SEED_DEMO_FULL_MATRIX: "false"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./metadata:/app/metadata
      - ./alembic:/app/alembic
      # فرانت بیلدشده: روی میزبان حتماً `cd admin-ui && npm run build` (dist در git نیست؛ بدون بیلد، UI قدیمی/خالی می‌ماند)
      - ./admin-ui/dist:/app/admin-ui/dist
      - ./scripts:/app/scripts
    restart: unless-stopped
    command: >
      sh -c "python /app/scripts/wait_for_db.py &&
             python /app/scripts/repair_alembic_if_empty_schema.py &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 3000 --reload"

  # ─── بیلد فرانت در داکر: خروجی در ./admin-ui/dist (همان پوشه‌ای که api mount می‌کند)
  # اجرا: docker compose run --rm admin-ui-build
  # پروفایل جدا تا `docker compose up` به‌طور پیش‌فرض node را pull نکند
  admin-ui-build:
    profiles:
      - admin-ui-build
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./admin-ui:/app
    command: sh -c "npm ci && npm run build"

  # ─── Admin UI جدا (Vite dev): اختیاری — پروفایل dev-ui (npm در ایمیج ممکن است به اینترنت نیاز داشته باشد)
  # دسترسی اصلی: ابتدا روی میزبان `cd admin-ui && npm run build` سپس فرانت از همان پورت 3000 سرو می‌شود.
  admin-ui:
    profiles:
      - dev-ui
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    container_name: anistito-admin-ui
    ports:
      - "5173:3000"
    depends_on:
      - api
    volumes:
      - ./admin-ui/src:/app/src
      - ./admin-ui/public:/app/public
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_PROXY_TARGET: http://api:3000
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
