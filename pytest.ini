[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    e2e: تست مرورگر Playwright — نیاز به playwright install chromium
# تست واحد: همان Postgres داکر — DATABASE پیش‌فرض anistito (TEST_DATABASE_URL اختیاری). PYTEST_SKIP_DROP_ALL=1 از drop جداول جلوگیری می‌کند
