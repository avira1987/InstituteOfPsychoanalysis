# Production compose - API serves built admin-ui (no separate admin-ui container)
# Redis maps to 6380 to avoid conflict with host Redis on 6379
services:
  db:
    image: postgres:16-alpine
    container_name: anistito-db
    environment:
      POSTGRES_USER: anistito
      POSTGRES_PASSWORD: anistito
      POSTGRES_DB: anistito
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anistito"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: anistito-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  api:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        # فقط هنگام docker build: APT_PROXY/PIP_PROXY (مثلاً socks5h://127.0.0.1:10808). زمان اجرا کانتینر از این‌ها استفاده نمی‌کند.
        APT_PROXY: ${APT_PROXY:-}
        PIP_PROXY: ${PIP_PROXY:-}
    container_name: anistito-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://anistito:anistito@db:5432/anistito
      DATABASE_URL_SYNC: postgresql://anistito:anistito@db:5432/anistito
      REDIS_URL: redis://redis:6379/0
      DEBUG: "false"
      SECRET_KEY: anistito-prod-secret-change-me
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "python /app/scripts/wait_for_db.py &&
             python /app/scripts/repair_alembic_if_empty_schema.py &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 3000"
volumes:
  postgres_data:
  redis_data:
