# Production compose - API serves built admin-ui (no separate admin-ui container)
# Redis maps to 6380 to avoid conflict with host Redis on 6379
services:
  db:
    image: postgres:16-alpine
    container_name: anistito-db
    environment:
      POSTGRES_USER: anistito
      POSTGRES_PASSWORD: anistito
      POSTGRES_DB: anistito
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anistito"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: anistito-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
      # network: host روی Docker Desktop ویندوز/مک پشتیبانی نمی‌شود و بیلد را می‌شکند؛ فقط روی لینوکس در صورت نیاز:
      # docker compose -f docker-compose.prod.yml build --build-arg ...   یا  DOCKER_BUILDKIT=1 docker build --network=host .
      args:
        # رزرو برای اسکریپت‌های بیلد سفارشی (ایمیج فعلی از APT در Dockerfile استفاده نمی‌کند)
        PIP_PROXY: ${PIP_PROXY:-}
    container_name: anistito-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://anistito:anistito@db:5432/anistito
      DATABASE_URL_SYNC: postgresql://anistito:anistito@db:5432/anistito
      REDIS_URL: redis://redis:6379/0
      DEBUG: "false"
      SECRET_KEY: anistito-prod-secret-change-me
      # پرداخت سپ: در فایل .env کنار همین compose تنظیم کنید؛
      # PAYMENT_PROVIDER=saman، SEP_TERMINAL_ID، SEP_PASSWORD (در صورت نیاز)،
      # PAYMENT_CALLBACK_URL=<همان دامنهٔ عمومی>/api/payment/callback، APP_BASE_URL برای ریدایرکت پس از کال‌بک
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "python /app/scripts/wait_for_db.py &&
             python /app/scripts/repair_alembic_if_empty_schema.py &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 3000 --log-level warning"
volumes:
  postgres_data:
  redis_data:
